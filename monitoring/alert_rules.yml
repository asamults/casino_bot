groups:
  - name: casino_bot_baseline
    rules:
      - alert: CasinoBotReadyDown
        expr: casino_bot_db_ready_state == 0
        for: 2m
        labels:
          severity: page
        annotations:
          summary: "/ready indicates DB unavailable"
          runbook: "docs/runbooks/db-readiness-failure.md"

      - alert: CasinoBotHTTP5xxSpike
        expr: |
          sum(rate(casino_bot_http_requests_total{status=~"5.."}[5m]))
          /
          sum(rate(casino_bot_http_requests_total[5m])) > 0.01
        for: 10m
        labels:
          severity: page
        annotations:
          summary: "HTTP 5xx rate > 1% over 10m"
          runbook: "docs/runbooks/http-5xx-spike.md"

      - alert: CasinoBotDeadLetterGrowth
        expr: sum(increase(casino_bot_webhook_dead_letter_total[15m])) > 0
        for: 15m
        labels:
          severity: ticket
        annotations:
          summary: "Dead-letter count is increasing"
          runbook: "docs/runbooks/webhook-dead-letter.md"

  - name: casino_bot_games
    rules:
      - alert: CasinoBotGameRejectBurst
        expr: sum(rate(casino_bot_game_round_rejected_total[5m])) > 3
        for: 10m
        labels:
          severity: ticket
        annotations:
          summary: "High rate of game engine rejects (>3/s averaged over 5m for 10m)"
          runbook: "docs/runbooks/game-reject-burst.md"

      - alert: CasinoBotGameRoundLatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(casino_bot_game_round_duration_seconds_bucket[5m])) by (le, game_id)
          ) > 2
        for: 15m
        labels:
          severity: ticket
        annotations:
          summary: "p95 game round duration > 2s (per game_id)"
          runbook: "docs/runbooks/game-round-latency.md"

