name: Security Gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  security-gates:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.11
        env:
          POSTGRES_USER: casino
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: casino_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U casino -d casino_db"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --no-cache-dir -r requirements.txt
          python -m pip install --no-cache-dir ruff bandit pip-audit
          python -m pip check

      - name: Set env
        run: |
          echo "PYTHONPATH=src" >> $GITHUB_ENV
          # Default env for tests/migrations (no production-only host hardening).
          echo "DATABASE_URL=postgresql+psycopg://casino:secret@127.0.0.1:5432/casino_db" >> $GITHUB_ENV
          echo "ENVIRONMENT=development" >> $GITHUB_ENV
          echo 'CORS_ALLOW_ORIGINS=["https://admin.example.com"]' >> $GITHUB_ENV
          echo "ALLOWED_HOSTS=localhost,127.0.0.1,testserver" >> $GITHUB_ENV

      - name: Validate env contract (.env.example)
        run: |
          python scripts/validate_env_contract.py --env-file .env.example

      - name: Validate env contract (production gate)
        run: |
          ENVIRONMENT=production \
          DATABASE_URL=postgresql+psycopg://casino:secret@127.0.0.1:5432/casino_db \
          SECRET_KEY=prod_secret_key_minimum_length_32__ \
          JWT_SIGNING_KEY=prod_jwt_signing_key_minimum_len_32 \
          REFRESH_TOKEN_PEPPER=prod_refresh_pepper_minimum_len_32 \
          USER_API_INTERNAL_TOKEN=prod_user_api_internal_token_min_len_32_____ \
          CORS_ALLOW_ORIGINS='["https://admin.example.com"]' \
          ALLOWED_HOSTS=api.example.com \
          BILLING_ALLOWED_RETURN_HOSTS=admin.example.com \
          python scripts/validate_env_contract.py --env-file /dev/null

      - name: Migration check
        run: |
          python scripts/wait_for_db.py --timeout-seconds 30
          alembic upgrade head

      - name: Migration downgrade smoke
        run: |
          python scripts/wait_for_db.py --timeout-seconds 30
          alembic downgrade -1
          alembic upgrade head

      - name: Install shellcheck
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends shellcheck
          shellcheck --version

      - name: Shell lint (bash -n + shellcheck)
        run: |
          REQUIRE_SHELLCHECK=1 ./scripts/lint_shell.sh

      - name: Ops contract smoke (M6W1)
        run: |
          ./scripts/ops/ops_contract_smoke.sh

      - name: Ruff
        run: |
          ruff check .
          ruff format --check .

      - name: Tests
        run: |
          python -m compileall -q src
          pytest -q

      - name: Webhook idempotency contract test
        run: |
          pytest -q tests/test_billing_webhooks.py

      - name: Bandit high severity gate
        run: |
          bandit -r src -ll

      # Ensure pip is current before audit (avoids CVE noise on an outdated pip wheel).
      - name: Upgrade pip (pre-audit)
        run: python -m pip install --upgrade pip

      - name: Dependency audit
        run: |
          pip-audit --progress-spinner off
