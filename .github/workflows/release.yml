name: GitHub Release (manual)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (e.g. v0.2.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate tag exists
        run: |
          git fetch --tags
          git rev-parse "${{ inputs.tag }}" >/dev/null

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          NOTES="$(python scripts/release_notes.py --version "${{ inputs.tag }}")"
          {
            echo "notes<<'EOF'"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          body: ${{ steps.notes.outputs.notes }}

